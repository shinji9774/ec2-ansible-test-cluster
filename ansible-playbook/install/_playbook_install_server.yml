---
- name: Install server
  hosts: servers
  gather_facts: false
  roles:
    - role: check_connection
    - role: apt_upgrade
    - role: common_packages
    - role: timezone
    - role: ssh_setup
    - role: auto_shutdown

- name: Install Master server
  hosts: master
  gather_facts: false
  roles:
    - role: ansible

- name: Reboot after installation
  hosts: servers
  gather_facts: false
  roles:
    - role: reboot
